# =============================================================================
# Grafana Alloy - Faro Web SDK Receiver
# =============================================================================
# Receives browser telemetry from Grafana Faro Web SDK and splits routing:
#   - Logs   → Loki directly (no server-side sampling; RUM data is already
#              client-sampled by the Faro SDK's sessionTracking.samplingRate)
#   - Traces → OTel Collector → (tail-sampled) → Jaeger
#
# Why not route logs through the OTel Collector?
#   The OTel Collector applies severity-based sampling (100% errors, 10% rest)
#   designed for backend app logs. Faro logs (Web Vitals, page events) have no
#   standard severity and would be double-sampled, destroying statistical
#   accuracy for P95/P99 metrics. Sending directly to Loki preserves 100%
#   of the already client-sampled RUM data and keeps Loki labels (kind,
#   measurement_type) intact for dashboard queries.
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: retail-observe
data:
  config.alloy: |
    // ── Faro receiver: accepts browser telemetry on /collect ──
    faro.receiver "default" {
      extra_log_labels = {
        app    = "frontend",
        source = "faro",
      }

      server {
        listen_address = "0.0.0.0"
        listen_port    = 12347

        cors_allowed_origins = ["*"]
      }

      output {
        logs   = [loki.process.faro.receiver]
        traces = [otelcol.exporter.otlphttp.default.input]
      }
    }

    // ── Extract kind label from logfmt body for Loki queries ──
    loki.process "faro" {
      stage.logfmt {
        mapping = {
          kind             = "",
          measurement_type = "type",
        }
      }

      stage.labels {
        values = {
          kind             = "kind",
          measurement_type = "measurement_type",
        }
      }

      forward_to = [loki.write.default.receiver]
    }

    // ── Write Faro logs directly to Loki (bypasses OTel Collector sampling) ──
    loki.write "default" {
      endpoint {
        url = "http://loki.retail-observe.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

    // ── Forward Faro traces to OTel Collector for tail-sampling ──
    otelcol.exporter.otlphttp "default" {
      client {
        endpoint = "http://otel-collector.retail-observe.svc.cluster.local:4318"
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: retail-observe
  labels:
    app: alloy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      containers:
        - name: alloy
          image: grafana/alloy:v1.5.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --stability.level=generally-available
          ports:
            - containerPort: 12347
              name: faro
            - containerPort: 12345
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: alloy-config

---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: retail-observe
  labels:
    app: alloy
spec:
  selector:
    app: alloy
  ports:
    - port: 12347
      targetPort: 12347
      name: faro
    - port: 12345
      targetPort: 12345
      name: http
